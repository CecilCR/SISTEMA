<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Empresa como Sistema - Quiz Mejorado</title>
    <meta property="og:title" content="La Empresa como Sistema - Quiz Mejorado">
    <meta property="og:description" content="Evalúa tu comprensión de conceptos sistémicos avanzados">
    <meta property="og:type" content="sitio-web">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f39c12;
            --success: #28a745;
            --error: #dc3545;
            --bg-light: #f8f9fa;
            --bg-white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-dark: #333333;
            --text-primary: #2c3e50;
            --text-secondary: #555555;
            --correct-bg: #d4edda;
            --correct-border: #28a745;
            --correct-text: #155724;
            --incorrect-bg: #f8d7da;
            --incorrect-border: #dc3545;
            --incorrect-text: #721c24;
            --option-hover-bg: #f0f4ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--primary);
            opacity: 0.8;
            top: -10px;
            animation: confetti-fall linear forwards;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            background: var(--bg-gradient);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .question-pill {
            background: #eaf2f8;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .score-pill {
            background: #e8f8f5;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--success);
            font-weight: 700;
            font-size: 1rem;
            border: 1px solid var(--success);
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.5s ease;
        }

        .content {
            padding: 40px 30px;
        }

        .question-text {
            font-size: 1.3em;
            color: var(--text-primary);
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .options-container {
            margin: 25px 0;
        }

        .option {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 18px 20px;
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .option:hover:not(.disabled) {
            background: var(--option-hover-bg);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 1.05em;
            line-height: 1.5;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            animation: pulseGreen 0.5s ease;
        }

        .option.incorrect {
            background: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            animation: shake 0.5s ease;
        }

        @keyframes pulseGreen {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.7;
            display: none;
            animation: slideIn 0.4s ease;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct-feedback {
            background: var(--correct-bg);
            border-left: 5px solid var(--correct-border);
            color: var(--correct-text);
        }

        .feedback.incorrect-feedback {
            background: var(--incorrect-bg);
            border-left: 5px solid var(--incorrect-border);
            color: var(--incorrect-text);
        }

        .feedback-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .correct-answer-display {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #856404;
            font-weight: 600;
            margin: 15px 0;
            color: #856404;
            display: none;
        }

        .correct-answer-display.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn:hover:not(:disabled) {
            background: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn.hidden {
            display: none;
        }

        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .results {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .results.show {
            display: block;
        }

        .results h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 2em;
        }

        .score-badge {
            font-size: 4em;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
        }

        .results p {
            font-size: 1.2em;
            color: var(--text-secondary);
            margin: 20px 0;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .header p {
                font-size: 1em;
            }

            .content {
                padding: 30px 20px;
            }

            .question-text {
                font-size: 1.1em;
            }

            .option {
                padding: 14px 16px;
            }

            .option label {
                font-size: 0.95em;
            }

            .top-bar {
                padding: 15px 20px;
            }

            .question-pill, .score-pill {
                font-size: 0.85rem;
                padding: 6px 12px;
            }

            .score-badge {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div id="confetti-container"></div>

    <div class="container">
        <div class="header">
            <h1>🏢 La Empresa como Sistema</h1>
            <p>Conceptos Sistémicos Avanzados</p>
        </div>

        <div class="top-bar">
            <span class="question-pill" id="question-counter">Pregunta 1 de 4</span>
            <span class="score-pill" id="score-display">🏆 0</span>
        </div>

        <div class="progress-container">
            <div class="progress-fill" id="progress-bar" style="width: 25%;"></div>
        </div>

        <div class="content">
            <div id="quiz-container">
                <!-- Preguntas se renderizan dinámicamente aquí -->
            </div>

            <div id="results-container" class="results">
                <h2>📊 Cuestionario completado</h2>
                <div class="score-badge" id="final-score">0/4</div>
                <p id="result-message"></p>
                <button class="btn" id="retry-btn">🔄 Volver a intentar</button>
            </div>

            <button class="btn hidden" id="next-btn">Siguiente pregunta →</button>
        </div>
    </div>

    <script>
        // Variables de estado con tracking
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        const totalQuestions = 4;
        let userAnswers = new Array(totalQuestions).fill(null);
        let userScores = new Array(totalQuestions).fill(0);

        // Referencias del DOM
        const quizContainer = document.getElementById('quiz-container');
        const resultsContainer = document.getElementById('results-container');
        const nextBtn = document.getElementById('next-btn');
        const retryBtn = document.getElementById('retry-btn');
        const progressBar = document.getElementById('progress-bar');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');
        const finalScoreSpan = document.getElementById('final-score');
        const resultMessageP = document.getElementById('result-message');

        // Preguntas del quiz - MEJORADAS PEDAGÓGICAMENTE
        const questions = [
            {
                id: 1,
                text: "Una corporación líder en fotografía analógica ignora el surgimiento de la tecnología digital. Sus gerentes deciden optimizar la eficiencia de la producción de rollos (proceso interno) y reducir costos, pero no logran detener la caída libre de sus ventas. ¿Qué error sistémico está causando el fracaso de esta empresa a pesar de optimizar sus procesos internos?",
                options: [
                    "No invirtió suficiente en mejorar la calidad de sus rollos fotográficos",
                    "Optimizó procesos internos pero ignoró las señales del mercado (sistema cerrado sin retroalimentación externa)",
                    "No redujo costos lo suficientemente rápido para competir",
                    "Sus empleados no trabajaron las horas necesarias para adaptarse"
                ],
                correct: 1,
                feedbackCorrect: "✓ ¡Excelente! La empresa se comportó como un sistema cerrado, optimizando solo sus procesos internos mientras ignoraba información crítica del entorno: el surgimiento de la tecnología digital. Este es un ejemplo clásico de entropía organizacional: cuando un sistema se aísla de su ambiente, inevitablemente se desgasta. Para sobrevivir (negentropía), debió usar la información del mercado como un INSUMO vital para transformar su modelo de negocio. La eficiencia interna sin adaptación externa acelera el fracaso. Los sistemas abiertos sobreviven justamente por su capacidad de procesar información ambiental y evolucionar.",
                feedbackIncorrect: "✗ La respuesta correcta es: 'Optimizó procesos internos pero ignoró las señales del mercado'. La empresa actuó como sistema cerrado al enfocarse únicamente en eficiencia interna (mejor producción de rollos, menores costos) mientras ignoraba el cambio tecnológico del entorno. Este aislamiento causa entropía: el sistema se desgasta porque no importa información externa vital. Mejorar el producto antiguo o reducir costos no resuelve el problema si el mercado ya migró a otra tecnología. La negentropía (supervivencia) requiere apertura al ambiente para detectar amenazas y oportunidades."
            },
            {
                id: 2,
                text: "El área de Finanzas de una exportadora decide recortar el presupuesto de 'Mantenimiento Preventivo' para mostrar mayores utilidades este mes. Dos semanas después, la maquinaria principal falla, deteniendo la producción y causando la pérdida de un contrato millonario. ¿Cómo explica este fenómeno el concepto de interrelación de las partes en un sistema?",
                options: [
                    "Cada área debe ser evaluada solo por sus propios resultados mensuales",
                    "El ahorro de Finanzas siempre es positivo para la empresa",
                    "La empresa es un todo interconectado: una decisión local puede generar falla catastrófica en el objetivo sistémico",
                    "Los sistemas empresariales no dependen de la coordinación entre áreas"
                ],
                correct: 2,
                feedbackCorrect: "✓ ¡Correcto! Este caso ilustra perfectamente la interrelación sistémica. Finanzas optimizó su resultado mensual (más utilidades a corto plazo), pero desencadenó un efecto dominó catastrófico en el sistema completo. La decisión local (recorte presupuesto) → falla operativa (maquinaria) → pérdida sistémica (contrato millonario). Esta cadena muestra que la empresa NO es suma de partes independientes: es un organismo interconectado donde cada subsistema afecta la salud del todo. El verdadero error fue evaluar a Finanzas SOLO por su ahorro mensual, ignorando el impacto en el objetivo sistémico total (rentabilidad sostenible). Esta pregunta evidencia por qué la gestión de relaciones entre áreas es crítica: sin coordinación, las decisiones locales destruyen valor global.",
                feedbackIncorrect: "✗ La respuesta correcta enfatiza que la empresa es un 'todo interconectado'. En este caso, Finanzas tomó una decisión aparentemente racional (recortar gasto para aumentar utilidad) sin considerar el impacto en otras partes del sistema. El resultado fue un 'efecto dominó': el ahorro de corto plazo generó una pérdida catastrófica de largo plazo. Esta situación demuestra que los subsistemas NO operan independientemente: están interrelacionados. La falla en Mantenimiento (causada por decisión de Finanzas) afectó Producción y finalmente destruyó el objetivo comercial completo. Un sistema empresarial sano requiere que cada área considere el impacto de sus decisiones en el todo."
            },
            {
                id: 3,
                text: "Una cadena de restaurantes enfrenta dos cambios simultáneos: nueva legislación tributaria (SUNAT modifica el IGV) y cambio en preferencias del consumidor (demanda por comida saludable). ¿Qué característica de sistema abierto le permite sobrevivir a estos cambios?",
                options: [
                    "Mantenerse aislado para no perder su identidad original",
                    "Intercambiar información con el entorno y adaptar sus procesos internos a las nuevas condiciones",
                    "Enfocarse solo en maximizar ganancias sin importar el entorno",
                    "Funcionar automáticamente sin necesidad de monitorear cambios externos"
                ],
                correct: 1,
                feedbackCorrect: "✓ ¡Muy bien! Un sistema abierto sobrevive gracias a su INTERCAMBIO constante con el ambiente: recibe información (nueva ley, preferencias), la procesa internamente (ajusta menú, procedimientos contables) y produce outputs adaptados (nuevos platos, cumplimiento tributario). La 'porosidad' con el entorno no es debilidad: es la estrategia de supervivencia. Sistemas cerrados mueren porque no detectan amenazas ni oportunidades. En cambio, sistemas abiertos transforman cambios externos en evolución interna. Este restaurante debe IMPORTAR información ambiental como insumo tan vital como los ingredientes físicos. Sin esa retroalimentación externa, cualquier empresa sucumbe a la entropía. El caso muestra que adaptabilidad NO es pérdida de identidad: es evolución inteligente basada en señales del entorno.",
                feedbackIncorrect: "✗ La respuesta correcta es 'Intercambiar información con el entorno y adaptar procesos'. Los sistemas abiertos sobreviven porque mantienen intercambio permanente con su ambiente: detectan cambios (nueva ley, nuevas preferencias), procesan esa información internamente y ajustan sus operaciones. El aislamiento (opción a) lleva a la entropía: si el restaurante ignora la legislación o las preferencias del consumidor, eventualmente fracasa. Maximizar ganancias sin considerar el entorno (opción c) es comportamiento de sistema cerrado destinado al colapso. Los sistemas abiertos no funcionan automáticamente (opción d): requieren monitoreo activo del ambiente para importar información vital y evolucionar. La adaptabilidad es la clave de supervivencia."
            },
            {
                id: 4,
                text: "Una startup tecnológica tiene capital de inversión, oficinas equipadas con tecnología de punta y un producto innovador, pero sus tres cofundadores están en conflicto constante y no se comunican. La empresa no logra lanzar el producto al mercado. ¿Por qué este caso ejemplifica que la empresa es principalmente un sistema social?",
                options: [
                    "Porque necesitan contratar a un gerente de recursos humanos",
                    "Porque los recursos técnicos y financieros solo se transforman en valor mediante coordinación de relaciones humanas efectivas",
                    "Porque la tecnología no puede tomar decisiones éticas por sí misma",
                    "Porque las empresas sin personería jurídica dependen solo de las personas"
                ],
                correct: 1,
                feedbackCorrect: "✓ ¡Excelente! Este caso muestra la TRANSMUTACIÓN en acción (o su ausencia). Drucker afirma que reunir recursos no crea una empresa: se necesita DIRECCIÓN que los transforme en valor. Esa transmutación ocurre a través de PERSONAS. Aquí hay capital, tecnología y producto (recursos), pero sin coordinación humana (comunicación, confianza, liderazgo) permanecen INERTES. No se transforman en valor económico. La 'magia' que convierte recursos en empresa es fundamentalmente SOCIAL: requiere alineación, colaboración y gestión de relaciones. Por eso afirmamos que la empresa es, ante todo, un sistema social: porque sin la dimensión relacional efectiva, todos los recursos técnicos y financieros quedan desactivados. Las personas son el catalizador de la transmutación. Sin ellas coordinadas, no hay empresa.",
                feedbackIncorrect: "✗ La respuesta correcta enfatiza que los recursos 'solo se transforman en valor mediante coordinación de relaciones humanas'. Este startup tiene TODOS los recursos técnicos y financieros necesarios, pero NO tiene el elemento social que los active: coordinación entre cofundadores. Drucker llama a esto 'transmutación': el proceso por el cual recursos inertes se convierten en empresa generadora de valor. Esa transmutación NO ocurre automáticamente al reunir recursos: requiere DIRECCIÓN, y la dirección es fundamentalmente un proceso social (comunicación, liderazgo, confianza). Contratar RRHH (opción a) no resuelve el problema de fondo. El caso demuestra que la empresa es sistema social porque sin coordinación humana efectiva, los recursos permanecen improductivos."
            }
        ];

        // Función para lanzar confetti
        function launchConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#667eea', '#764ba2', '#f39c12', '#28a745', '#dc3545', '#17a2b8'];
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.3 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Función para actualizar el progreso
        function updateProgress() {
            const progress = ((currentQuestion) / totalQuestions) * 100;
            progressBar.style.width = progress + '%';
            questionCounter.textContent = `Pregunta ${currentQuestion + 1} de ${totalQuestions}`;
            scoreDisplay.textContent = `🏆 ${score}`;
        }

        // Función para renderizar la pregunta actual
        function renderQuestion() {
            const q = questions[currentQuestion];
            let html = `
                <div class="question-text">${q.text}</div>
                <div class="options-container" id="options-container">
            `;

            q.options.forEach((option, index) => {
                html += `
                    <div class="option" id="option-${index}">
                        <input type="radio" name="question" value="${index}" id="opt-${index}">
                        <label for="opt-${index}">${option}</label>
                    </div>
                `;
            });

            html += `</div>
                <div class="feedback" id="feedback-container"></div>
                <div class="correct-answer-display" id="correct-answer-display"></div>
            `;

            quizContainer.innerHTML = html;

            // Hacer toda la opción clickable
            const options = document.querySelectorAll('.option');
            options.forEach(option => {
                option.addEventListener('click', function(e) {
                    if (answered) return;
                    const radio = this.querySelector('input[type="radio"]');
                    if (radio) {
                        radio.checked = true;
                        selectOption(parseInt(radio.value));
                    }
                });
            });

            updateProgress();
        }

        // Función para seleccionar opción
        function selectOption(index) {
            if (answered) return;
            
            answered = true;
            userAnswers[currentQuestion] = index;
            
            showFeedback(index, false);
        }

        // Función para mostrar feedback
        function showFeedback(selectedIndex, isRerender = false) {
            const q = questions[currentQuestion];
            const isCorrect = (selectedIndex === q.correct);
            
            // Deshabilitar todas las opciones
            const allOptions = document.querySelectorAll('.option');
            const allRadios = document.querySelectorAll('input[type="radio"]');
            
            allOptions.forEach(opt => opt.classList.add('disabled'));
            allRadios.forEach(radio => radio.disabled = true);
            
            // Marcar visualmente
            const selectedOptionDiv = document.getElementById(`option-${selectedIndex}`);
            const correctOptionDiv = document.getElementById(`option-${q.correct}`);
            
            if (isCorrect) {
                selectedOptionDiv.classList.add('correct');
                
                if (!isRerender) {
                    score += 10;
                    userScores[currentQuestion] = 10;
                    launchConfetti();
                }
            } else {
                selectedOptionDiv.classList.add('incorrect');
                correctOptionDiv.classList.add('correct');
                
                if (!isRerender) {
                    userScores[currentQuestion] = 0;
                }
            }
            
            // Actualizar score display
            scoreDisplay.textContent = `🏆 ${score}`;
            
            // Mostrar feedback
            const feedbackContainer = document.getElementById('feedback-container');
            const correctAnswerDisplay = document.getElementById('correct-answer-display');
            
            if (isCorrect) {
                feedbackContainer.className = 'feedback show correct-feedback';
                feedbackContainer.innerHTML = `
                    <div class="feedback-title">✓ ¡Correcto!</div>
                    <p>${q.feedbackCorrect}</p>
                `;
                correctAnswerDisplay.classList.remove('show');
            } else {
                feedbackContainer.className = 'feedback show incorrect-feedback';
                feedbackContainer.innerHTML = `
                    <div class="feedback-title">✗ Respuesta incorrecta</div>
                    <p>${q.feedbackIncorrect}</p>
                `;
                correctAnswerDisplay.innerHTML = 
                    `<strong>✓ Respuesta correcta:</strong> ${q.options[q.correct]}`;
                correctAnswerDisplay.classList.add('show');
            }
            
            // Mostrar botón siguiente
            nextBtn.classList.remove('hidden');
        }

        // Función siguiente pregunta
        function nextQuestion() {
            currentQuestion++;
            answered = false;
            nextBtn.classList.add('hidden');
            
            if (currentQuestion < totalQuestions) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        // Función mostrar resultados
        function showResults() {
            quizContainer.style.display = 'none';
            nextBtn.classList.add('hidden');
            resultsContainer.classList.add('show');
            
            const percentage = (score / (totalQuestions * 10)) * 100;
            finalScoreSpan.textContent = `${score}/${totalQuestions * 10}`;
            
            let message = '';
            
            if (percentage >= 100) {
                message = '🏆 ¡Dominio excepcional de conceptos sistémicos avanzados! Has comprendido a profundidad entropía, interrelación, sistemas abiertos y transmutación. Tu capacidad para aplicar estos conceptos a casos concretos demuestra pensamiento sistémico maduro.';
                launchConfetti();
                
            } else if (percentage >= 75) {
                message = '🎯 ¡Muy buen desempeño! Tienes una comprensión sólida de los conceptos sistémicos. Revisa el feedback de las preguntas incorrectas para reforzar la conexión entre teoría y aplicación práctica en sistemas empresariales.';
                
            } else if (percentage >= 50) {
                message = '📚 Conocimiento adecuado de los fundamentos. Comprendes las definiciones básicas, pero te recomendamos profundizar en cómo estos conceptos se manifiestan en situaciones empresariales reales. Repasa especialmente los casos de entropía e interrelación.';
                
            } else {
                message = '💪 Es momento de reforzar conceptos sistémicos. Vuelve a revisar los materiales del curso enfocándote en: sistemas abiertos vs cerrados, entropía/negentropía, interrelación de subsistemas y transmutación. Estos conceptos son fundamentales para la gestión organizacional. ¡El esfuerzo vale la pena!';
            }
            
            resultMessageP.textContent = message;
        }

        // Función resetear quiz
        function resetQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            userAnswers = new Array(totalQuestions).fill(null);
            userScores = new Array(totalQuestions).fill(0);
            
            resultsContainer.classList.remove('show');
            quizContainer.style.display = 'block';
            nextBtn.classList.add('hidden');
            
            updateProgress();
            renderQuestion();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Event listeners
        nextBtn.addEventListener('click', nextQuestion);
        retryBtn.addEventListener('click', resetQuiz);

        // Inicialización
        renderQuestion();
    </script>
</body>
</html>
