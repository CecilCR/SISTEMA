<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: La Empresa como Sistema</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg-color: #f8f9fa;
            --text-primary: #2c3e50;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-primary); margin: 0; padding: 20px; }
        .quiz-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Header y Top Bar */
        .header { background: var(--primary); color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 10px 0 0; opacity: 0.9; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: white; border-bottom: 1px solid #e0e0e0; }
        .question-pill { background: #eaf2f8; padding: 8px 16px; border-radius: 20px; color: var(--text-primary); font-weight: 600; }
        .score-pill { background: #e8f8f5; padding: 8px 16px; border-radius: 20px; color: var(--success); font-weight: 700; border: 1px solid var(--success); }
        
        /* Barra de progreso */
        .progress-container { width: 100%; height: 6px; background: #e0e0e0; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        /* Área de Preguntas */
        .question-area { padding: 30px; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .options-grid { display: grid; gap: 15px; }
        .option-btn { background: white; border: 2px solid #e0e0e0; padding: 15px 20px; border-radius: 8px; text-align: left; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #f0f8ff; }
        .option-btn.selected-correct { background: #e8f8f5; border-color: var(--success); color: var(--success); font-weight: bold; }
        .option-btn.selected-incorrect { background: #fdedec; border-color: var(--danger); color: var(--danger); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        
        /* Feedback formativo */
        .feedback-box { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; line-height: 1.5; }
        .feedback-box.correct { background: #e8f8f5; border-left: 4px solid var(--success); display: block; }
        .feedback-box.incorrect { background: #fdedec; border-left: 4px solid var(--danger); display: block; }
        
        /* Controles */
        .next-btn { margin-top: 20px; padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; display: none; }
        .next-btn:hover { background: #2980b9; }
        .results-area { padding: 40px 30px; text-align: center; display: none; }
        .results-score { font-size: 48px; font-weight: bold; margin: 20px 0; color: var(--primary); }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1>🏢 La Empresa como Sistema</h1>
        <p>Fundamentos para la Gestión de Relaciones Organizacionales</p>
    </div>
    
    <div class="top-bar">
        <span class="question-pill" id="question-counter">Pregunta 1 de 5</span>
        <span class="score-pill" id="score-display">🏆 0 Pts</span>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>

    <div class="question-area" id="q-area">
        <div class="question-text" id="q-text"></div>
        <div class="options-grid" id="options"></div>
        <div class="feedback-box" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Siguiente Pregunta ➔</button>
    </div>

    <div class="results-area" id="results">
        <h2>Análisis de Desempeño</h2>
        <div class="results-score" id="final-score">0%</div>
        <p id="results-msg" style="font-size: 18px; line-height: 1.6;"></p>
        <button class="next-btn" style="display:inline-block; margin-top:20px;" onclick="location.reload()">🔄 Reiniciar Evaluación</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Desde la perspectiva de la Teoría de Sistemas, ¿cómo se define estructuralmente a una empresa?",
            options: [
                "Un agrupamiento mecánico de recursos tangibles ordenados lógicamente para producir rentabilidad.",
                "Un conjunto de elementos dinámicamente relacionados que interactúan para lograr un propósito u objetivo.",
                "Una unidad económica aislada que depende exclusivamente de la extracción de bienes.",
                "Una entidad jurídica cuyo único propósito es el pago de impuestos a favor del Estado."
            ],
            correct: 1,
            feedbackC: "¡Excelente análisis estructural! Entender la empresa como un conjunto de elementos dinámicamente relacionados evita el reduccionismo operativo y resalta la interdependencia sistémica.",
            feedbackI: "¿Qué opción reconoce que las partes de una organización interactúan entre sí y no funcionan de manera aislada?"
        },
        {
            q: "Según los postulados de Peter Drucker, ¿cuál es el verdadero motor que convierte recursos inertes en una empresa generadora de valor?",
            options: [
                "El capital financiero, tal como lo afirmaban los economistas clásicos del siglo XIX.",
                "La automatización pura de la Operación Tecnológica.",
                "La 'transmutación' de los recursos mediante una dirección efectiva y un liderazgo visionario.",
                "La separación estricta entre las funciones administrativas y operativas."
            ],
            correct: 2,
            feedbackC: "¡Decisión acertada! Drucker enfatiza que el capital por sí solo es inanimado. Es la dirección estratégica y el liderazgo los que logran esta 'transmutación' organizacional.",
            feedbackI: "Piensa en qué elemento humano es necesario para coordinar los recursos físicos y financieros que por sí solos son inanimados."
        },
        {
            q: "En el ciclo de transformación del sistema empresarial, ¿qué diferencia clave existe entre 'Productos/Servicios' y 'Resultados e Impacto'?",
            options: [
                "Los productos son las entradas del sistema, y el impacto es el proceso de transformación.",
                "Los productos son salidas tangibles, mientras que el impacto incluye salidas intangibles como el desarrollo organizacional y la satisfacción.",
                "Ambos representan la rentabilidad económica generada al final del ciclo corporativo.",
                "Los productos son evaluados por clientes, y el impacto solo por entidades fiscales."
            ],
            correct: 1,
            feedbackC: "¡Precisión conceptual excepcional! Diferenciar las salidas tangibles de los resultados intangibles (como la satisfacción del empleado) es fundamental para evaluar la sostenibilidad a largo plazo.",
            feedbackI: "¿Qué alternativa incluye factores intangibles de alto valor para las personas dentro de la organización, más allá de lo que se vende al mercado?"
        },
        {
            q: "El 'Ambiente Externo' de una organización se divide en General y Específico (Sector). ¿Qué variables pertenecen al entorno Específico?",
            options: [
                "Clientes, competidores actuales, proveedores y regulaciones sectoriales.",
                "Factores macroeconómicos, políticos, legales y sociológicos.",
                "Infraestructuras tecnológicas globales y variables culturales de una región.",
                "El nivel de confianza directiva y la comunicación interna entre departamentos."
            ],
            correct: 0,
            feedbackC: "¡Lectura estratégica correcta! El entorno Específico abarca el mercado directo y el segmento objetivo, exigiendo agilidad táctica para responder a las fuerzas competitivas.",
            feedbackI: "Recuerda que el entorno 'Específico' se refiere directamente a los actores que participan en el mismo mercado y cadena de suministro de la empresa."
        },
        {
            q: "Al afirmar que 'la empresa no es solo un sistema productivo, sino un sistema social', ¿qué implicación directa tiene esto en la gestión gerencial?",
            options: [
                "Que la empresa debe priorizar la filantropía por encima de las ventas.",
                "Que la coordinación eficiente de recursos depende de relaciones humanas efectivas, impactando en resultados económicos.",
                "Que el área de Talento Humano debe asumir la dirección general de las operaciones tecnológicas.",
                "Que el desarrollo de la infraestructura y el control de calidad técnica pasan a un segundo plano irrelevante."
            ],
            correct: 1,
            feedbackC: "¡Visión sistémica lograda! Entender la organización como un sistema social significa reconocer que fenómenos conductuales como la confianza y el liderazgo son determinantes críticos del desempeño económico.",
            feedbackI: "¿De qué manera la calidad de las interacciones humanas (comunicación, confianza) puede afectar el éxito económico y operativo?"
        }
    ];

    let currentQ = 0;
    let score = 0;

    function renderQuestion() {
        const qData = questions[currentQ];
        document.getElementById('q-text').innerText = (currentQ + 1) + ". " + qData.q;
        document.getElementById('question-counter').innerText = `Pregunta ${currentQ + 1} de ${questions.length}`;
        document.getElementById('progress').style.width = `${(currentQ / questions.length) * 100}%`;
        
        const optionsHtml = qData.options.map((opt, index) => 
            `<button class="option-btn" onclick="selectOption(${index})">${opt}</button>`
        ).join('');
        
        document.getElementById('options').innerHTML = optionsHtml;
        document.getElementById('feedback').className = 'feedback-box';
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectOption(selectedIndex) {
        const qData = questions[currentQ];
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        
        buttons.forEach(btn => btn.disabled = true);
        
        if (selectedIndex === qData.correct) {
            buttons[selectedIndex].classList.add('selected-correct');
            feedback.className = 'feedback-box correct';
            feedback.innerHTML = `<strong>✓ ¡Excelente análisis!</strong><br><br>${qData.feedbackC}`;
            score += 20; 
            document.getElementById('score-display').innerText = `🏆 ${score} Pts`;
        } else {
            buttons[selectedIndex].classList.add('selected-incorrect');
            feedback.className = 'feedback-box incorrect';
            feedback.innerHTML = `<strong>💡 Pista reflexiva:</strong><br><br>${qData.feedbackI}`;
        }
        
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < questions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('q-area').style.display = 'none';
        document.getElementById('progress').style.width = '100%';
        const results = document.getElementById('results');
        results.style.display = 'block';
        
        document.getElementById('final-score').innerText = `${score}%`;
        
        let msg = '';
        if (score === 100) {
            msg = "🏆 <strong>Dominio excepcional.</strong> Has consolidado una visión sociotécnica magistral. Estás preparado para gestionar transformaciones profundas e intervenir sistémicamente.";
            triggerConfetti();
        } else if (score >= 80) {
            msg = "🎯 <strong>Muy buen desempeño.</strong> Demuestras un manejo sólido de los ecosistemas empresariales y de la transmutación de recursos.";
        } else if (score >= 60) {
            msg = "📊 <strong>Desempeño adecuado.</strong> Tienes las bases, pero es clave afinar la predicción de cómo los factores del entorno impactan internamente.";
        } else {
            msg = "💪 <strong>Momento de reforzar.</strong> Te recomendamos revisar el concepto de 'transmutación de recursos' de Drucker y la estructura de sistemas abiertos.";
        }
        document.getElementById('results-msg').innerHTML = msg;
    }

    function triggerConfetti() {
        for(let i=0; i<100; i++) {
            let conf = document.createElement('div');
            conf.style.position = 'fixed';
            conf.style.width = '10px';
            conf.style.height = '10px';
            conf.style.backgroundColor = ['#f1c40f', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'][Math.floor(Math.random()*5)];
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.top = '-20px';
            conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            conf.style.zIndex = '9999';
            conf.style.pointerEvents = 'none';
            document.body.appendChild(conf);
            
            let angle = Math.random() * Math.PI * 2;
            let velocity = 2 + Math.random() * 4;
            let x = 0;
            let y = 0;
            let rotation = 0;
            
            let anim = setInterval(() => {
                y += velocity;
                x += Math.sin(angle) * 2;
                rotation += velocity * 2;
                conf.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
                
                if (y > window.innerHeight) {
                    clearInterval(anim);
                    conf.remove();
                }
            }, 20);
        }
    }

    renderQuestion();
</script>
</body>
</html>
